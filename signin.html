<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - SafeComply</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="modal.css" />
  <style>
    .password-wrap { position: relative; }
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      padding: 4px;
      cursor: pointer;
      color: #5b6b7b;
    }
    .toggle-password:focus { outline: none; }
    .toggle-password svg { width: 22px; height: 22px; }
  </style>
</head>

<body>
  <div class="login-container">
    <!-- Welcome Section (Left Side) -->
    <div class="welcome-section">
      <h1 class="welcome-title">Hello!</h1>
      <p class="welcome-text">
        Don't have an account?<br />Create one now to get started.
      </p>
      <button class="signin-btn" onclick="window.location.href='Signup.html'">
        Create Account
      </button>
    </div>

    <!-- Login Section (Right Side) -->
    <div class="form-section">
      <h2 class="form-title">Login</h2>

      <form id="loginForm">
        <div class="form-group">
          <input id="username" type="text" class="form-input" placeholder="Username" required />
        </div>

        <div class="form-group password-wrap">
          <input id="password" type="password" class="form-input" placeholder="Password" required />
          <button type="button" class="toggle-password" aria-label="Show password" data-target="password">
            <span aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 5c-4.5 0-8.5 3-10 7 1.5 4 5.5 7 10 7s8.5-3 10-7c-1.5-4-5.5-7-10-7Z" stroke="currentColor" stroke-width="2"/>
                <circle cx="12" cy="12" r="3" fill="currentColor"/>
              </svg>
            </span>
          </button>
        </div>

        <!-- <a href="#" class="forgot-password">Forgot Password?</a> -->

        <button type="submit" class="signup-btn">Login</button>
      </form>
    </div>

    <script src="modal.js"></script>
    <script>
      // Password visibility toggle
      (function attachPasswordToggles(){
        document.querySelectorAll('.toggle-password').forEach(btn => {
          btn.addEventListener('click', () => {
            const targetId = btn.getAttribute('data-target');
            const input = document.getElementById(targetId);
            if (!input) return;
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
            btn.innerHTML = isHidden
              ? '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 3l18 18" stroke="currentColor" stroke-width="2"/><path d="M12 5c-4.5 0-8.5 3-10 7 .65 1.73 1.74 3.25 3.1 4.45M21.99 12c-.57-1.53-1.56-2.92-2.86-4.04M8.53 8.53A3.5 3.5 0 0012 15.5c.8 0 1.54-.27 2.12-.73" stroke="currentColor" stroke-width="2"/></svg>'
              : '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 5c-4.5 0-8.5 3-10 7 1.5 4 5.5 7 10 7s8.5-3 10-7c-1.5-4-5.5-7-10-7Z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>';
          });
        });
      })();

      document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        if (!username || !password) {
          showWarning('Please provide username and password', 'Missing Fields');
          return;
        }

        try {
          const resp = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });

          const data = await resp.json();
          if (!resp.ok) {
            showError('Login failed: ' + (data.error || data.message || resp.status), 'Authentication Failed');
            return;
          }

          // store token
          localStorage.setItem('authToken', data.access_token);
          localStorage.setItem('userRole', data.role || '');
          localStorage.setItem('username', data.username || '');

          // Fetch profile to get email and picture
          try {
            const profileResp = await fetch('/auth/profile', {
              headers: { 'Authorization': 'Bearer ' + data.access_token }
            });
            if (profileResp.ok) {
              const profile = await profileResp.json();
              if (profile.email) localStorage.setItem('userEmail', profile.email);
              if (profile.profile_picture) localStorage.setItem('userProfilePicture', profile.profile_picture);
            }
          } catch (e) {
            console.error('Failed to fetch profile:', e);
          }

          window.location.href = 'dashboard.html';
        } catch (err) {
          showError('Login error: ' + err.message, 'Connection Error');
        }
      });
    </script>
  </div>
</body>

</html>
